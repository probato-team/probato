<footer class="page-footer mt-auto pt-3 bg-dark text-white">
    <div class="container" >
        <div class="text-center" >Copyright © {{ site.time | date: "%Y" }} Probato. <br>Todos os direitos reservados.</div>
    </div>
    <div class="text-end mx-2 py-1" >
        
        {% if site.github.is_project_page %}
            <span class="site-footer-owner"><a href="{{ site.github.repository_url }}" target="_blank" >{{ site.github.repository_name }}</a> is maintained by <a href="{{ site.github.owner_url }}" target="_blank" >{{ site.github.owner_name }}</a>.</span>
        {% endif %}
        
        <span class="site-footer-credits">This page was generated by <a href="https://pages.github.com" target="_blank" >GitHub Pages</a>.</span>
    </div>
</footer>
