site_name: Probato
site_url: https://probato.org
repo_name: probato-team/probato
repo_url: https://github.com/probato-team/probato
remote_branch: main
site_dir: ../docs

copyright: <p> Copyright &copy; 2024-<script>document.write(new Date().getFullYear())</script> Probato</p>

nav:

  - Início: 
    - index.md
    - objective.md
    - target-audience.md
    - features.md
    - architecture.md

  - Guia do usuário:
    - documentation\configure-environment.md
    - documentation\create-project.md
    - documentation\understand-good-pratices-for-testing.md
    - documentation\implement-basic-script.md
    - documentation\configure-browser-execution.md
    - documentation\implement-browser-execution.md
    - documentation\parameterize-input-data.md
    - documentation\change-application-state.md
    - documentation\create-extension-points.md
    - documentation\example-project.md

theme:
  name: material
  language: pt-BR
  
  icon:
    repo: fontawesome/brands/github
  
  features:
    - navigation.expand
    - navigation.path
    - navigation.prune
    - toc.follow
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - navigation.footer
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.code.select

  palette: 

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para o modo escuro

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: grey
      accent: blue grey
      toggle:
        icon: material/brightness-4
        name: Mudar para o modo claro

extra:

  analytics:
    provider: google
    property: G-XZR907P520
    feedback:
      title: Esta página foi útil?
      ratings:
        - icon: material/thumb-up-outline
          name: Esta página foi útil
          data: 1
          note: Obrigado pelo seu feedback!
        - icon: material/thumb-down-outline
          name: Esta página pode ser melhorada
          data: 0
          note: Obrigado pelo seu feedback!

  social:
    - icon: fontawesome/brands/github
      link: https://github.com/probato-team/probato
    - icon: fontawesome/brands/youtube 
      link: https://www.youtube.com/@probato

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
