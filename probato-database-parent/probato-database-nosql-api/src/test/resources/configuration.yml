execution:
    screen: PRIMARY

    delay:
        waitingTimeout: 1
        actionInterval: 1

    video:
        enabled: TRUE
        quality: HIGH
        frameRate: 40

    target:
        url: http://google.com
        version: 1.0.0

    manager:
        url: http://localhost:9999
        token: 89caa226caa52436d25a0f94bb42ee7ef0ac92c42154c6fe775ba230ad83417b
        submit: TRUE

browsers:
    - type: CHROME
      headless: TRUE
      dimension:
          mode: FULLSCREEN

    - type: FIREFOX
      dimension:
          mode: MAXIMIZED

    - type: EDGE
      dimension:
          mode: CUSTOM
          width: 800
          height: 600

datasources:
    probato-mongo:
        url: mongodb://localhost:27017?authSource=admin
        type: MONGODB
        database: admin
        username: admin
        password: secret

    probato-cassandra:
        url: cassandra://localhost:9042
        type: CASSANDRA
        database: system
        username: cassandra
        password: cassandra

    without-url:
        database: testdb
        type: MONGODB

    without-type:
        url: mongodb://localhost:27017
        database: testdb

    without-database:
        url: mongodb://localhost:27017
        type: MONGODB
